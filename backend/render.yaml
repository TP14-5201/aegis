services:
  - type: web
    name: aegis-api
    runtime: python
    rootDir: aegis/backend
    buildCommand: pip install -r requirements.txt && python -m src.services.data_seeding
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOGIN_PASSWORD_HASH
        sync: false
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
