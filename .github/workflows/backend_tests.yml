name: Run Backend Tests

on:
  push:
    branches: [ "underdevelopment" ]
  pull_request:
    branches: [ "main", "underdevelopment" ]

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        python -m pip install pytest pytest-cov coverage
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run tests and generate XML coverage
      working-directory: backend
      run: |
        # Changed report type to xml for better tool compatibility
        pytest tests/ -v --cov=src --cov-report=xml
      
    - name: Pytest coverage comment
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: backend/coverage.xml
        title: Backend Coverage Report
        badge-title: Coverage
  
  deploy:
    runs-on: ubuntu-latest
    needs: test # CRITICAL: This ensures deployment ONLY happens if tests pass
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Deploy to Staging (cherebowl-dev) when pushing to underdevelopment
      - name: Deploy to Vercel (Staging)
        if: github.ref == 'refs/heads/underdevelopment'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}

      # Deploy to Production (cherebowl) when pushing to main (after merge)
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod' # This flag pushes to your production domain