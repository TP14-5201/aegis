name: Backend CI/CD

on:
  pull_request:
    branches: [ "underdevelopment", "main" ]
  push:
    branches: [ "underdevelopment", "main" ]

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Run tests ONLY on pull_request events (not on merge/push)
  # ─────────────────────────────────────────────────────────────────
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        python -m pip install pytest pytest-cov coverage
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run tests and generate XML coverage
      working-directory: backend
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Pytest coverage comment
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: backend/coverage.xml
        title: Backend Coverage Report
        badge-title: Coverage

  # ─────────────────────────────────────────────────────────────────
  # Deploy ONLY on push events (i.e. after a PR is merged)
  # Tests do NOT run again — deploy is independent of the test job
  # ─────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Deploy to Staging when merged into underdevelopment
      - name: Deploy to Vercel (Staging)
        if: github.ref == 'refs/heads/underdevelopment'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}

      # Deploy to Production when merged into main
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'